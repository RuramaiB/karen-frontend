<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: #f8fafc;
    }
    h3 { color: #1e293b; margin-top: 0; }
    p { font-size: 0.9rem; color: #475569; }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover {
      background: #2563eb;
    }
    .status {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #059669;
      display: none;
    }
  </style>
</head>
<body>
  <h3>Proctor Control</h3>
  <p>Use this to manually force fullscreen if automatic trigger fails.</p>
  <button id="forceBtn">Force Fullscreen</button>
  <div id="status" class="status">Command Sent!</div>
  <script src="popup.js"></script>
</body>
</html>
